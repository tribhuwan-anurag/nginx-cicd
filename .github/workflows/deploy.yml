name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy index.html to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "Connected to EC2"
            cd /var/www/html
            sudo rm -f index.html
            echo "<h1>Hello from GitHub Actions 🚀</h1>" | sudo tee index.html
